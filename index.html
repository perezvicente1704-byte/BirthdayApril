<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación de Cumpleaños</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 { color: #ff4b5c; }
    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #ff4b5c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #e8434f; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 ¡Estás Invitado! 🎉</h1>
    <p>Ven a celebrar mi cumpleaños</p>
    <p><strong>Fecha:</strong> 20 de Mayo</p>
    <p><strong>Hora:</strong> 7:00 PM</p>
    <p><strong>Lugar:</strong> Mi casa</p>

    <h3>Confirma tu asistencia</h3>

    <form id="form">
      <input type="email" id="gmail" placeholder="Tu Gmail" required>
      <input type="text" id="nombre" placeholder="Tu nombre" required>
      
      <select id="confirmacion" required>
        <option value="">¿Confirmas asistencia?</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <select id="comida" required>
        <option value="">¿Vas a comer?</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <button type="submit">Confirmar asistencia</button>
    </form>

    <p id="mensaje"></p>
  </div>

  <script>
    const scriptURL = "TU_SCRIPT_ID_AQUI"; // reemplaza con tu URL de Apps Script

    const form = document.getElementById('form');
    form.addEventListener('submit', e => {
      e.preventDefault();

      const data = {
        gmail: document.getElementById('gmail').value,
        nombre: document.getElementById('nombre').value,
        confirmacion: document.getElementById('confirmacion').value,
        comida: document.getElementById('comida').value
      };

      fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'application/json' }
      })
      .then(() => {
        document.getElementById('mensaje').innerText = "¡Gracias por confirmar!";
        form.reset();
      })
      .catch(() => {
        document.getElementById('mensaje').innerText = "Error al enviar";
      });
    });
  </script>
</body>
</html>
