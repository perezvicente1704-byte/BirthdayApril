        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <select id="comida" required>
        <option value="">¿Vas a comer?</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <button type="submit">Confirmar</button>
    </form>

    <p id="mensaje"></p>

    <h3>📍 Ubicación</h3>

    // COUNTDOWN
    const eventDate = new Date("April 17, 2026 22:00:00").getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const diff = eventDate - now;

      const d = Math.floor(diff / (1000*60*60*24));
      const h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
      const m = Math.floor((diff % (1000*60*60))/(1000*60));

      document.getElementById("countdown").innerText = `⏳ ${d}d ${h}h ${m}m`;
    }, 1000);

    const form = document.getElementById('form');
    form.addEventListener('submit', e => {
      e.preventDefault();

      const data = {
        nombre: document.getElementById('nombre').value,
        confirmacion: document.getElementById('confirmacion').value,
        comida: document.getElementById('comida').value
      };

      fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'application/json' }
      })
      .then(() => {
        document.getElementById('mensaje').innerText = "✅ Confirmado, nos vemos!";
        form.reset();
      })
      .catch(() => {
        document.getElementById('mensaje').innerText = "❌ Error al enviar";
      });
    });
  </script>
