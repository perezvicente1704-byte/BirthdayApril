<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎉 Invitación PRO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 520px;
      margin: auto;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }
    h1 { color: #ff4b5c; }
    .countdown { font-size: 22px; margin: 15px 0; font-weight: bold; }
    input, select, button {
      width: 92%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      background: #ff4b5c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #e8434f; }
    iframe { width: 100%; border-radius: 10px; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎂 ¡Estás Invitado! 🎂</h1>
    <p>Celebración de cumpleaños</p>
    <p><strong>📅 Fecha:</strong> 20 de Mayo</p>
    <p><strong>⏰ Hora:</strong> 7:00 PM</p>

    <div class="countdown" id="countdown"></div>

    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Cumpleaños&dates=20260520T190000/20260520T230000" target="_blank">
      <button>📅 Agregar a Google Calendar</button>
    </a>

    <h3>Confirma tu asistencia</h3>

    <form id="form">
      <input type="email" id="gmail" placeholder="Tu Gmail" required>
      <input type="text" id="nombre" placeholder="Tu nombre" required>

      <select id="confirmacion" required>
        <option value="">¿Confirmas asistencia?</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <select id="comida" required>
        <option value="">¿Vas a comer?</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <button type="submit">Confirmar</button>
    </form>

    <p id="mensaje"></p>

    <h3>📍 Ubicación</h3>
    <iframe src="https://www.google.com/maps?q=Lima&output=embed" height="200"></iframe>
  </div>

  <script>
    const scriptURL = "TU_SCRIPT_ID_AQUI";

    // COUNTDOWN
    const eventDate = new Date("May 20, 2026 19:00:00").getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const diff = eventDate - now;

      const d = Math.floor(diff / (1000*60*60*24));
      const h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
      const m = Math.floor((diff % (1000*60*60))/(1000*60));

      document.getElementById("countdown").innerText = `⏳ ${d}d ${h}h ${m}m`;
    }, 1000);

    // AUTOGUARDAR EMAIL
    document.getElementById('gmail').value = localStorage.getItem('gmail') || '';

    const form = document.getElementById('form');
    form.addEventListener('submit', e => {
      e.preventDefault();

      const data = {
        gmail: document.getElementById('gmail').value,
        nombre: document.getElementById('nombre').value,
        confirmacion: document.getElementById('confirmacion').value,
        comida: document.getElementById('comida').value
      };

      localStorage.setItem('gmail', data.gmail);

      fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'application/json' }
      })
      .then(() => {
        document.getElementById('mensaje').innerText = "✅ Confirmado, nos vemos!";
        form.reset();
      })
      .catch(() => {
        document.getElementById('mensaje').innerText = "❌ Error al enviar";
      });
    });
  </script>
</body>
</html>
