<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Invitación PRO+</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#ff9a9e,#fad0c4);text-align:center}
.card{background:white;border-radius:20px;padding:25px;max-width:520px;margin:auto}
input,select,button{width:90%;padding:10px;margin:6px;border-radius:10px}
.drinks{display:grid;grid-template-columns:1fr 1fr;gap:5px;text-align:left}
.drinks label{background:#f5f5f5;padding:8px;border-radius:8px;cursor:pointer}
ul{text-align:left}
</style>
</head>
<body>
<div class="card">
<h1>🎂 Invitación</h1>
<p><b>17 Abril - 10 PM</b></p>
<div id="countdown"></div>

<form id="form">
<input id="nombre" placeholder="Tu nombre" required>

<select id="confirmacion" required>
<option value="">¿Confirmas?</option>
<option>Sí</option>
<option>No</option>
</select>

<select id="comida" required>
<option value="">¿Comes?</option>
<option value="Sí">Sí</option>
<option value="No">No</option>
</select>

<h4>🍹 Elige máximo 3 tragos</h4>
<div class="drinks">
<label><input type="checkbox" value="Ron"> Ron</label>
<label><input type="checkbox" value="Whisky"> Whisky</label>
<label><input type="checkbox" value="Cerveza"> Cerveza</label>
<label><input type="checkbox" value="Pisco"> Pisco</label>
<label><input type="checkbox" value="Gin Tonic"> Gin Tonic</label>
<label><input type="checkbox" value="Vodka"> Vodka</label>
<label><input type="checkbox" value="Tequila"> Tequila</label>
<label><input type="checkbox" value="Vino"> Vino</label>
<label><input type="checkbox" value="Champagne"> Champagne</label>
</div>

<button>Confirmar</button>
</form>

<p id="msg"></p>
<a id="linkComida" target="_blank"></a>

<h3>🍹 Ranking</h3>
<ul id="ranking"></ul>

<iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d402.0030296853956!2d-76.35312632485807!3d-13.063882004115543!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1ses!2spe!4v1776376138829!5m2!1ses!2spe" height="200"></iframe>
</div>

<script>
const url="https://script.google.com/macros/s/AKfycbxEiFsLa7WT6XL5QUFBv1meFNhip7nUXIRnzp6wxOMHRQRfM2bv74kX1OBOqbet7F4/exec";

// limitar a 3 checkboxes
const checks=document.querySelectorAll("input[type=checkbox]");
checks.forEach(c=>{
 c.addEventListener("change",()=>{
 let checked=[...checks].filter(x=>x.checked);
 if(checked.length>3){
 c.checked=false;
 alert("Máximo 3 tragos");
 }
 });
});

// countdown
const eventDate=new Date("April 17, 2026 22:00:00").getTime();
setInterval(()=>{
let d=eventDate-new Date().getTime();
document.getElementById("countdown").innerText=`⏳ ${Math.floor(d/86400000)}d`;
},1000);

let cache=[];

async function cargar(){
const r=await fetch(url);
const data=await r.json();
cache=data;

let conteo={};
 data.forEach(p=>{
 if(p.tragos){
 p.tragos.split(",").forEach(t=>{
 conteo[t]=(conteo[t]||0)+1;
 });
 }
 });

let ranking=Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
let html="";
ranking.forEach(([t,c])=>html+=`<li>${t} (${c})</li>`);
document.getElementById("ranking").innerHTML=html;
}
setInterval(cargar,5000);
cargar();

const formEl = document.getElementById("form");

formEl.onsubmit = async (e) => {
 e.preventDefault();

 const nombre = document.getElementById("nombre").value;
 const confirmacionVal = document.getElementById("confirmacion").value;
 const comidaVal = document.getElementById("comida").value;
 const msgEl = document.getElementById("msg");

 if (cache.some(p => p.nombre.toLowerCase() === nombre.toLowerCase())) {
   msgEl.innerText = "⚠️ Ya existe";
   return;
 }

 let checksSel = [...checks].filter(c => c.checked).map(c => c.value).join(",");

 // envío simplificado (compatible 100% con Apps Script)
fetch(url, {
  method: "POST",
  mode: "no-cors",
  body: new URLSearchParams({
    nombre,
    confirmacion: confirmacionVal,
    comida: comidaVal,
    tragos: checksSel
  })
});

msgEl.innerText = "✅ Enviado (verifica en Excel)";

if (comidaVal === "Sí") {
  let token = btoa(nombre + Date.now());
  let link = `${url}?qr=${token}`;
  let linkEl = document.getElementById("linkComida");
  linkEl.href = link;
  linkEl.innerText = "🍔 Reclamar comida";
}

formEl.reset();
setTimeout(cargar, 2000);
};
</script>
</body>
</html>
