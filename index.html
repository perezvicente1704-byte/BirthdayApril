<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎉 Invitación PRO+</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 520px;
      margin: auto;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }
    h1 { color: #ff4b5c; }
    .countdown { font-size: 22px; margin: 15px 0; font-weight: bold; }
    input, select, button {
      width: 92%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      background: #ff4b5c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    iframe { width: 100%; border-radius: 10px; margin-top: 15px; }
    ul { text-align:left; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎂 ¡Estás Invitado! 🎂</h1>
    <p><strong>📅 17 Abril</strong> - <strong>10:00 PM</strong></p>

    <div class="countdown" id="countdown"></div>

    <h3>Confirma tu asistencia</h3>

    <form id="form">
      <input type="text" id="nombre" placeholder="Tu nombre" required>

      <select id="confirmacion" required>
        <option value="">¿Confirmas?</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <select id="comida" required>
        <option value="">¿Comes?</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>

      <button type="submit">Confirmar</button>
    </form>

    <p id="mensaje"></p>

    <h3>📊 Estadísticas</h3>
    <p id="contador"></p>

    <h3>🎉 Asisten</h3>
    <ul id="si"></ul>

    <h3>❌ No asisten</h3>
    <ul id="no"></ul>

    <h3>🍽️ Comida</h3>
    <p id="comidaStats"></p>

    <h3>📍 Ubicación</h3>
    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d402.0030296853956!2d-76.35312632485807!3d-13.063882004115543!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1ses!2spe!4v1776376138829!5m2!1ses!2spe" height="200"></iframe>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxEiFsLa7WT6XL5QUFBv1meFNhip7nUXIRnzp6wxOMHRQRfM2bv74kX1OBOqbet7F4/exec";

    // COUNTDOWN
    const eventDate = new Date("April 17, 2026 22:00:00").getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const diff = eventDate - now;
      const d = Math.floor(diff / (1000*60*60*24));
      const h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
      const m = Math.floor((diff % (1000*60*60))/(1000*60));
      document.getElementById("countdown").innerText = `⏳ ${d}d ${h}h ${m}m`;
    }, 1000);

    const form = document.getElementById('form');
    form.addEventListener('submit', e => {
      e.preventDefault();

      const data = {
        nombre: document.getElementById('nombre').value,
        confirmacion: document.getElementById('confirmacion').value,
        comida: document.getElementById('comida').value
      };

      fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(data)
      })
      .then(() => {
        document.getElementById('mensaje').innerText = "✅ Confirmado";
        form.reset();
        setTimeout(cargarDatos, 2000);
      })
      .catch(() => {
        document.getElementById('mensaje').innerText = "❌ Error";
      });
    });

    async function cargarDatos() {
      try {
        const res = await fetch(scriptURL);
        const data = await res.json();

        let si = 0, no = 0, comen = 0;
        document.getElementById("si").innerHTML = "";
        document.getElementById("no").innerHTML = "";

        data.forEach(p => {
          if (p.confirmacion === "Sí") {
            si++;
            if (p.comida === "Sí") comen++;
            const li = `<li>${p.nombre}</li>`;
            document.getElementById("si").innerHTML += li;
          } else {
            no++;
            const li = `<li>${p.nombre}</li>`;
            document.getElementById("no").innerHTML += li;
          }
        });

        document.getElementById("contador").innerText = `Asisten: ${si} | No: ${no}`;
        document.getElementById("comidaStats").innerText = `Comen: ${comen}`;

      } catch(e) {
        console.log(e);
      }
    }

    cargarDatos();
    setInterval(cargarDatos, 5000);
  </script>
</body>
</html>
