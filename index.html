<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Invitación</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align: center;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 25px;
  max-width: 500px;
  margin: auto;
}

input, select, button {
  width: 90%;
  padding: 10px;
  margin: 6px;
  border-radius: 10px;
}

.drinks {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  text-align: left;
}

.drinks label {
  background: #f5f5f5;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

img {
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🎂 Invitación</h1>
  <p><b>17 Abril - 10 PM</b></p>

  <!-- ⏳ CONTADOR -->
  <h2 id="countdown"></h2>

  <form id="form">
    <input id="nombre" placeholder="Tu nombre" required>

    <select id="confirmacion" required>
      <option value="">¿Confirmas?</option>
      <option>Sí</option>
      <option>No</option>
    </select>

    <select id="comida" required>
      <option value="">¿Comes?</option>
      <option>Sí</option>
      <option>No</option>
    </select>

    <h4>🍹 Elige máximo 3 tragos</h4>

    <div class="drinks">
      <label><input type="checkbox" value="Ron"> Ron</label>
      <label><input type="checkbox" value="Whisky"> Whisky</label>
      <label><input type="checkbox" value="Cerveza"> Cerveza</label>
      <label><input type="checkbox" value="Pisco"> Pisco</label>
      <label><input type="checkbox" value="Gin Tonic"> Gin Tonic</label>
      <label><input type="checkbox" value="Vodka"> Vodka</label>
      <label><input type="checkbox" value="Tequila"> Tequila</label>
      <label><input type="checkbox" value="Vino"> Vino</label>
      <label><input type="checkbox" value="Champagne"> Champagne</label>
    </div>

    <button type="submit">Confirmar</button>
  </form>

  <p id="msg"></p>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbx-Q_BCR--_yqQ7L1qQPyfTbqm8bIg603LC6SC6dyR81K7383wY_qZggvZWMoEMesOl/exec";


// ⏳ CONTADOR
const countdownEl = document.getElementById("countdown");
const targetDate = new Date("April 17, 2026 22:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    countdownEl.innerText = "🎉 ¡La fiesta empezó!";
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  countdownEl.innerText = `⏳ ${d}d ${h}h ${m}m ${s}s`;
}, 1000);


// 🍹 LIMITE DE 3 TRAGOS
const checks = document.querySelectorAll("input[type=checkbox]");
checks.forEach(c => {
  c.addEventListener("change", () => {
    let seleccionados = [...checks].filter(x => x.checked);
    if (seleccionados.length > 3) {
      c.checked = false;
      alert("Máximo 3 tragos");
    }
  });
});


// 🚀 ENVÍO FORMULARIO
const form = document.getElementById("form");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const confirmacion = document.getElementById("confirmacion").value;
  const comida = document.getElementById("comida").value;

  const tragos = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(c => c.value)
    .join(",");

  // enviar a Google Sheets
  fetch(url, {
    method: "POST",
    mode: "no-cors",
    body: new URLSearchParams({
      nombre: nombre,
      confirmacion: confirmacion,
      comida: comida,
      tragos: tragos
    })
  });

  // generar QR solo si come
  let qrHTML = "";
  if (comida === "Sí") {
    const token = btoa(nombre + Date.now());
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${token}`;

    qrHTML = `
      <br><b>🍔 Tu QR para comida:</b><br>
      <img src="${qrUrl}">
      <p>Guárdalo para reclamar tu comida</p>
    `;
  }

  document.getElementById("msg").innerHTML =
    "✅ Confirmación enviada" + qrHTML;

  form.reset();
});
</script>

</body>
</html>
